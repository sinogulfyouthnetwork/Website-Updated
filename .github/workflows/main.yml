Thought for 9s
actions/deploy-pages@v4 is trying to request an OIDC token, and your workflow/job token does not have the required permission. GitHub’s Pages docs and the action’s README both call out that the deploy job needs both pages: write and id-token: write. 

Use this pattern:

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # build your site here
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
A few things to check:

If you set permissions: at the job level, it overrides the workflow-level permissions for that job. So your deploy job must still include id-token: write if you define job permissions there. 

Make sure you are using the built-in GITHUB_TOKEN, not a PAT, for this step. The OIDC id-token permission is tied to GITHUB_TOKEN. 

For Pages deployments, the official flow is configure-pages → build → upload-pages-artifact → deploy-pages. 

About the Request timeout ... /idtoken/... line: that can happen as a transient failure while fetching the OIDC token, but the missing id-token: write permission is still the primary configuration problem here, and GitHub explicitly surfaces that in the final error. 

